name: CI/CD ImmoPredictor

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Job 1 : Lint ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install black isort flake8

      - name: black
        run: black --check --line-length 99 .

      - name: isort
        run: isort --check-only --profile black .

      - name: flake8
        run: flake8 --max-line-length=99 --exclude=.venv,migrations .

  # ─── Job 2 : Tests ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: immo
          POSTGRES_PASSWORD: immo_test
          POSTGRES_DB: immo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-ci
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: immo_test
      DB_USER: immo
      DB_PASSWORD: immo_test
      DB_HOST: localhost
      DB_PORT: "5432"
      PREDICTION_API_URL: http://localhost:9999
      PREDICTION_API_USERNAME: user
      PREDICTION_API_PASSWORD: user

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest tests/ --cov=. --cov-report=term --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

      - name: Upload htmlcov on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/

  # ─── Job 3 : Build Docker ─────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4 : Deploy Staging ───────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy to staging
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/immo_predictor
            docker compose pull
            docker compose up -d
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --no-input
            echo "Staging déployé ✓"

  # ─── Job 5 : Deploy Production ────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app/immo_predictor
            docker compose pull
            docker compose up -d --scale web=2
            docker compose exec -T web python manage.py migrate
            docker compose exec -T web python manage.py collectstatic --no-input
            echo "Production déployée ✓"