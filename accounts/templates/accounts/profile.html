{% extends "base.html" %}
{% block title %}Mon profil{% endblock %}
{% block content %}
<div class="container container--narrow">
  <h1>Mon <span class="accent">profil</span></h1>
  <form method="post" class="auth-form">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group {% if field.errors %}has-error{% endif %}">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<span class="error-msg" role="alert">{{ field.errors.0 }}</span>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-primary">Enregistrer</button>
  </form>
  <hr>
  <div class="danger-zone">
    <h2>Zone RGPD</h2>
    <a href="{% url 'export_data' %}" class="btn-secondary">Exporter mes données</a>
    <a href="{% url 'request_deletion' %}" class="btn-danger">Demander la suppression</a>
  </div>
</div>
{% endblock %}
