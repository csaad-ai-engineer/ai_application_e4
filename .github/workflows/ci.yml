name: CI/CD ImmoPredictor

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Job 1 : Lint ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install black==24.8.0 isort==5.13.2 flake8==7.1.1

      - name: black
        run: black --check --line-length 99 .

      - name: isort
        run: isort --check-only --profile black .

      - name: flake8
        run: flake8 --max-line-length=144 --exclude=.venv,migrations .

  # ─── Job 2 : Tests ────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: immo
          POSTGRES_PASSWORD: immo_test
          POSTGRES_DB: immo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test-secret-key-ci
      DEBUG: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: immo_test
      DB_USER: immo
      DB_PASSWORD: immo_test
      DB_HOST: localhost
      DB_PORT: "5432"
      PREDICTION_API_URL: http://localhost:9999
      PREDICTION_API_USERNAME: user
      PREDICTION_API_PASSWORD: user

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: pytest tests/ --cov=. --cov-report=term --cov-report=xml --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

      - name: Upload htmlcov on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: htmlcov
          path: htmlcov/

  # ─── Job 3 : Build Docker ─────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─── Job 4 : Deploy Staging (Railway develop) ─────────────
  deploy-staging:
    name: Deploy Staging (Railway)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway staging
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        with:
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          detach: true

  # ─── Job 5 : Deploy Production (Railway main) ─────────────
  deploy-production:
    name: Deploy Production (Railway)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway production
        uses: bervProject/railway-deploy@main
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PROD }}
        with:
          service: ${{ secrets.RAILWAY_SERVICE_ID }}
          detach: true
